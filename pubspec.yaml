name: laundry_app
description: نظام إدارة مغسلة السجاد - تطبيق أندرويد حقيقي
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # حالة وتوجيه
  get: ^4.6.6
  get_storage: ^2.1.1

  # شبكة و API
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # واجهة المستخدم
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.0.9
  photo_view: ^0.14.0
  image_picker: ^1.0.7

  # رسوم بيانية
  fl_chart: ^0.66.0

  # خرائط وتتبع
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # إشعارات
  flutter_local_notifications: ^16.3.0
  firebase_messaging: ^14.7.9
  firebase_core: ^2.24.2

  # أدوات
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  excel: ^4.0.2
  csv: ^6.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  animations: ^2.0.8

  # أيقونات وخطوط
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.1.0

  #Themes
  dynamic_color: ^1.6.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
